<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>런뉴 — 로그인</title>
<link rel="stylesheet" href="style.css">
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
  integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
  crossorigin="anonymous"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  .login-page { position:relative; overflow:hidden; justify-content:flex-end; }
  .login-bg {
    position:absolute; inset:0;
    background:url('https://images.unsplash.com/photo-1530549387789-4c1017266635?w=800&q=80') center/cover;
    filter:brightness(.3);
  }
  .login-bg-grad {
    position:absolute; inset:0;
    background:linear-gradient(to bottom, transparent 25%, var(--bg) 75%);
  }
  .login-content {
    position:relative; z-index:1;
    padding:0 28px 52px;
    animation:slideUp .5s ease both;
  }
  .login-logo {
    font-family:'Bebas Neue',sans-serif;
    font-size:68px; letter-spacing:4px; color:#fff; line-height:1; margin-bottom:4px;
  }
  .login-logo span { color:var(--accent); }
  .login-tagline {
    font-size:12px; color:rgba(255,255,255,.45);
    font-weight:300; letter-spacing:2px; text-transform:uppercase; margin-bottom:44px;
  }
  .login-btns { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
  .btn-kakao {
    width:100%; height:54px; border-radius:14px;
    background:var(--kakao); border:none;
    display:flex; align-items:center; justify-content:center; gap:10px;
    font-family:'Noto Sans KR',sans-serif; font-size:15px; font-weight:700;
    color:rgba(0,0,0,.85); cursor:pointer; transition:opacity .15s;
  }
  .btn-kakao:active { opacity:.82; }
  .btn-google {
    width:100%; height:54px; border-radius:14px;
    background:#fff; border:none;
    display:flex; align-items:center; justify-content:center; gap:10px;
    font-family:'Noto Sans KR',sans-serif; font-size:15px; font-weight:700;
    color:#333; cursor:pointer; transition:opacity .15s;
  }
  .btn-google:active { opacity:.82; }
  .btn-skip {
    width:100%; padding:13px; background:none; border:none;
    font-family:'Noto Sans KR',sans-serif; font-size:13px;
    color:rgba(255,255,255,.3); cursor:pointer;
    text-decoration:underline; text-underline-offset:3px; transition:color .15s;
  }
  .btn-skip:active { color:rgba(255,255,255,.6); }
  .login-notice {
    font-size:10px; color:rgba(255,255,255,.2);
    text-align:center; line-height:1.8; margin-top:8px;
  }
</style>
</head>
<body>
<div class="page login-page">
  <div class="login-bg"></div>
  <div class="login-bg-grad"></div>

  <div class="login-content">
    <div class="login-logo">RUN<span>NU</span></div>
    <div class="login-tagline">마라톤 · 트레일 · 러닝 대회 일정</div>

    <div class="login-btns">
      <!-- 카카오 -->
      <button class="btn-kakao" onclick="loginKakao()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="rgba(0,0,0,.85)">
          <path d="M12 3C6.477 3 2 6.477 2 10.857c0 2.787 1.637 5.232 4.1 6.698l-1.045 3.9c-.09.337.295.608.587.41L10.1 19.3c.624.087 1.258.132 1.9.132 5.523 0 10-3.477 10-7.857C22 6.477 17.523 3 12 3z"/>
        </svg>
        카카오로 시작하기
      </button>

      <!-- 구글 — 직접 renderButton 사용 (redirect_uri 불필요) -->
      <button class="btn-google" onclick="loginGoogle()">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google로 시작하기
      </button>
    </div>

    <button class="btn-skip" onclick="skipLogin()">로그인 없이 둘러보기</button>
    <p class="login-notice">로그인 시 서비스 이용약관 및 개인정보<br>처리방침에 동의하는 것으로 간주합니다</p>
  </div>

  <!-- 구글 One Tap 렌더용 숨김 컨테이너 -->
  <div id="googleBtnContainer" style="position:fixed;opacity:0;pointer-events:none;top:0;left:0;"></div>
</div>

<script src="app.js"></script>
<script>
  /* 실제 로그인 상태일 때만 목록으로 (스킵은 로그인 아님) */
  var session = restoreSession();
  if (session === 'user') window.location.href = getBasePath() + 'index.html';

  /* 카카오 초기화 */
  initKakao();
</script>
</body>
</html>
