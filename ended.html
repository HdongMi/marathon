<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>런뉴 — 마감된 대회</title>
<link rel="stylesheet" href="style.css">
<style>
  /* ── 레이아웃 (wishlist 동일 구조) ── */
  .w-header {
    padding: 20px 20px 12px;
    padding-top: calc(20px + env(safe-area-inset-top));
    flex-shrink: 0;
  }
  .w-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; color: var(--text); letter-spacing: 2px; line-height: 1;
  }
  .w-title span { color: var(--accent); }
  .w-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .w-count-row {
    padding: 0 16px 8px;
    font-size: 12px; color: var(--muted); flex-shrink: 0;
  }
  .w-count-row strong { color: var(--text); }

  .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .scroll-area::-webkit-scrollbar { display: none; }

  .race-list {
    padding: 0 16px;
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
  }

  /* ── 마감 카드 스타일 오버레이 ── */
  .race-card.ended-card {
    opacity: 0.55;
    filter: grayscale(45%);
    position: relative;
  }
  /* 기존 카드 우측 dday 영역 대신 마감 뱃지를 겹쳐 표시 */
  .race-card.ended-card .dday {
    background: rgba(160,30,30,.9) !important;
    color: #fff !important;
  }
  /* 좌측 액센트 바 — 빨간색으로 */
  .race-card.ended-card::before {
    background: rgba(180,40,40,.7) !important;
  }

  /* ── 빈 상태 ── */
  .empty-box {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px 30px; text-align: center; gap: 14px;
  }
  .empty-icon { font-size: 52px; }
  .empty-title { font-size: 17px; font-weight: 700; color: var(--text); }
  .empty-desc  { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .empty-btn {
    margin-top: 4px; padding: 12px 28px; border-radius: 14px;
    background: var(--accent); border: none;
    font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700;
    color: #000; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body>
<div class="page">

  <div style="display:flex; flex-direction:column; flex:1; overflow:hidden;">

    <div class="w-header">
      <div class="w-title">CLOSED <span>RACES</span></div>
      <div class="w-sub">접수가 마감된 대회 목록이에요</div>
    </div>

    <div class="w-count-row">
      총 <strong id="endedCount">–</strong>개 대회
    </div>

    <div class="scroll-area">
      <div class="race-list" id="endedList">
        <div class="state-box">
          <div class="spinner"></div>
        </div>
      </div>
    </div>

  </div>

  <nav class="tab-bar">
    <a class="tab-btn" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      대회목록
    </a>
    <a class="tab-btn active" href="ended.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <line x1="9" y1="15" x2="15" y2="15"/>
      </svg>
      마감대회
    </a>
    <a class="tab-btn" href="wishlist.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      찜 목록
    </a>
  </nav>

</div>

<script src="app.js"></script>
<script>
  (async () => {
    // loadRaces() 호출 → app.js 전역 endedRaces 채워짐
    await loadRaces();

    const listEl  = document.getElementById('endedList');
    const countEl = document.getElementById('endedCount');

    if (!endedRaces || !endedRaces.length) {
      listEl.innerHTML = `
        <div class="empty-box">
          <div class="empty-icon">📭</div>
          <div class="empty-title">마감된 대회가 없어요</div>
          <div class="empty-desc">현재 접수 마감된 대회가 없습니다</div>
          <button class="empty-btn" onclick="location.href='index.html'">대회 둘러보기</button>
        </div>`;
      return;
    }

    countEl.textContent = endedRaces.length;

    // app.js cardHtml() 재사용
    // detail.html?i=인덱스&source=ended 로 연결 — detail.html이 endedRaces에서 찾도록
    listEl.innerHTML = endedRaces.map((r, i) => {
      // cardHtml이 생성한 href를 source=ended 파라미터 추가로 교체
      const html = cardHtml(r, i, endedRaces);
      return html.replace(
        `href="detail.html?i=${i}"`,
        `href="detail.html?i=${i}&source=ended"`
      );
    }).join('');

    // 마감 스타일 적용
    listEl.querySelectorAll('.race-card').forEach(card => {
      card.classList.add('ended-card');
    });
  })();
</script>
</body>
</html>
