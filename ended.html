<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>런뉴 — 마감된 대회</title>
<link rel="stylesheet" href="style.css">
<style>
  .tab-content { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  .scroll-area  { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* 헤더 */
  .ended-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 56px 16px 12px;
    background: var(--bg);
    border-bottom: 1px solid rgba(255,255,255,.07);
    flex-shrink: 0;
  }
  .back-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 22px;
    line-height: 1;
    padding: 4px 8px 4px 0;
    cursor: pointer;
  }
  .ended-header h2 {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    margin: 0;
  }
  .ended-badge {
    margin-left: auto;
    background: rgba(255,255,255,.08);
    color: rgba(255,255,255,.45);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
  }

  /* 공고 카드 — 흐리게 처리 */
  .ended-card {
    opacity: 0.5;
    filter: grayscale(60%);
    position: relative;
  }
  .ended-card::after {
    content: '접수마감';
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(180,40,40,.85);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 4px;
    letter-spacing: .5px;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    color: rgba(255,255,255,.3);
    font-size: 14px;
    gap: 12px;
  }
</style>
</head>
<body>
<div class="page" id="app">
  <div class="tab-content">

    <div class="ended-header">
      <button class="back-btn" onclick="history.back()">←</button>
      <h2>마감된 대회</h2>
      <span class="ended-badge" id="endedCount">0개</span>
    </div>

    <div class="scroll-area">
      <div class="race-list" id="endedList">
        <div class="empty-state">
          <span style="font-size:36px">📭</span>
          마감된 대회가 없습니다.
        </div>
      </div>
    </div>

  </div>

  <!-- 탭바 -->
  <nav class="tab-bar">
    <a class="tab-btn" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      대회목록
    </a>
    <a class="tab-btn active" href="ended.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <line x1="9" y1="15" x2="15" y2="15"/>
      </svg>
      마감공고
    </a>
    <a class="tab-btn" href="wishlist.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      찜 목록
    </a>
  </nav>
</div>

<script src="app.js"></script>
<script>
  (() => {
    // index.html 에서 sessionStorage 에 저장해 둔 마감 공고 불러오기
    const raw = sessionStorage.getItem('endedRaces');
    const endedRaces = raw ? JSON.parse(raw) : [];

    const listEl  = document.getElementById('endedList');
    const countEl = document.getElementById('endedCount');

    if (!endedRaces.length) return;

    countEl.textContent = `${endedRaces.length}개`;

    listEl.innerHTML = '';

    endedRaces.forEach(race => {
      let cardHtml;

      if (typeof renderRaceCard === 'function') {
        cardHtml = renderRaceCard(race);
      } else {
        cardHtml = `
          <div class="race-card ended-card">
            <div class="race-date">${race.date ?? ''}</div>
            <div class="race-name">${race.name ?? race.title ?? '대회명 없음'}</div>
            <div class="race-meta">${race.location ?? ''} · ${race.course ?? ''}</div>
          </div>`;
      }

      const wrapper = document.createElement('div');
      wrapper.className = 'ended-card-wrapper';
      wrapper.innerHTML = typeof cardHtml === 'string' ? cardHtml : '';

      if (cardHtml instanceof HTMLElement) {
        cardHtml.classList.add('ended-card');
        listEl.appendChild(cardHtml);
      } else {
        const card = wrapper.firstElementChild;
        if (card) card.classList.add('ended-card');
        listEl.appendChild(wrapper);
      }
    });
  })();
</script>
</body>
</html>
