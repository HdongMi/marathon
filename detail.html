<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>런뉴 — 대회 상세</title>
<link rel="stylesheet" href="style.css">
<style>
  .d-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .d-scroll::-webkit-scrollbar { display: none; }

  .d-hero { position: relative; height: 260px; overflow: hidden; flex-shrink: 0; }
  .d-hero img { width: 100%; height: 100%; object-fit: cover; filter: brightness(.5); }
  .d-hero-grad {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,.2) 0%, var(--bg) 100%);
  }
  .d-back {
    position: absolute;
    top: calc(16px + env(safe-area-inset-top));
    left: 16px;
    width: 38px; height: 38px; background: rgba(0,0,0,.55);
    border: 1px solid rgba(255,255,255,.15); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; backdrop-filter: blur(10px); text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }
  .d-wish {
    position: absolute;
    top: calc(16px + env(safe-area-inset-top));
    right: 16px;
    width: 38px; height: 38px; background: rgba(0,0,0,.55);
    border: 1px solid rgba(255,255,255,.15); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; backdrop-filter: blur(10px);
    -webkit-tap-highlight-color: transparent;
  }
  .d-hero-txt { position: absolute; bottom: 20px; left: 20px; right: 68px; }
  .d-hero-txt h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 800; color: #fff;
    line-height: 1.2; text-shadow: 0 2px 12px rgba(0,0,0,.6);
  }

  .d-body { padding: 20px; }

  .d-courses { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .dc {
    padding: 7px 16px; border-radius: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 700; letter-spacing: 1px;
  }
  .dc-full  { background: rgba(232,240,0,.15); color: var(--accent);  border: 1px solid rgba(232,240,0,.3); }
  .dc-half  { background: rgba(0,201,167,.15);  color: var(--teal);   border: 1px solid rgba(0,201,167,.3); }
  .dc-trail { background: rgba(120,100,255,.15);color: var(--purple); border: 1px solid rgba(120,100,255,.3); }
  .dc-short { background: rgba(0,180,255,.15);  color: var(--blue);   border: 1px solid rgba(0,180,255,.3); }
  .dc-ultra { background: rgba(255,160,0,.15);  color: var(--orange); border: 1px solid rgba(255,160,0,.3); }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
  .info-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px;
  }
  .info-box.hi { border-color: rgba(232,240,0,.25); }
  .info-box.full { grid-column: 1 / -1; }
  .info-lbl {
    font-size: 10px; color: var(--muted); font-weight: 600;
    text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 5px;
  }
  .info-lbl svg { opacity: .6; flex-shrink: 0; }
  .info-val { font-size: 13px; color: var(--text); font-weight: 700; line-height: 1.5; }

  .fee-list { display: flex; flex-direction: column; gap: 6px; }
  .fee-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .fee-course { color: var(--muted); font-weight: 500; }
  .fee-price  { color: var(--text);  font-weight: 700; }

  .d-section { margin-bottom: 24px; }
  .d-sec-title {
    font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .d-sec-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .link-row {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; cursor: pointer; transition: border-color .2s;
    text-decoration: none; margin-bottom: 8px;
    -webkit-tap-highlight-color: transparent;
  }
  .link-row:last-child { margin-bottom: 0; }
  .link-row:active { border-color: var(--accent); }
  .link-row.primary { border-color: rgba(232,240,0,.25); }
  .link-icon {
    width: 36px; height: 36px; border-radius: 10px; background: var(--surface2);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .link-body { flex: 1; min-width: 0; }
  .link-label { font-size: 13px; color: var(--text); font-weight: 700; margin-bottom: 2px; }
  .link-url { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .link-arrow { flex-shrink: 0; color: var(--muted); }

  .cta-bar {
    padding: 10px 20px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--bg) 55%, transparent);
    display: flex; gap: 10px; flex-shrink: 0;
  }
  .cta-share {
    width: 52px; height: 52px; border-radius: 14px;
    border: 1px solid var(--border); background: var(--surface);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: border-color .15s; -webkit-tap-highlight-color: transparent;
  }
  .cta-share:active { border-color: var(--accent); }
  .cta-reg {
    flex: 1; height: 52px; border-radius: 14px;
    background: var(--accent); border: none;
    font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; color: #000;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform .15s; -webkit-tap-highlight-color: transparent;
  }
  .cta-reg.closed { background: var(--surface2); color: var(--muted); cursor: default; }
  .cta-reg:not(.closed):active { transform: scale(.97); }
</style>
</head>
<body>
<div class="page">
  <div class="d-scroll">

    <div class="d-hero">
      <img src="https://images.unsplash.com/photo-1513593771513-7b58b6c4af38?w=800&q=80" alt="" id="heroImg">
      <div class="d-hero-grad"></div>
      <!-- 뒤로가기: source에 따라 동적으로 설정 -->
      <a class="d-back" id="backBtn" href="index.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </a>
      <div class="d-wish" id="wishBtn" onclick="onToggleWish()">
        <svg id="wishIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>
      <div class="d-hero-txt">
        <h1 id="dTitle">로딩 중...</h1>
      </div>
    </div>

    <div class="d-body">

      <div class="d-courses" id="dCourses"></div>

      <div class="info-grid">
        <div class="info-box">
          <div class="info-lbl">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            장소
          </div>
          <div class="info-val" id="dLocation">–</div>
        </div>
        <div class="info-box hi">
          <div class="info-lbl">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            대회일
          </div>
          <div class="info-val" id="dDate">–</div>
        </div>
        <div class="info-box">
          <div class="info-lbl">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            접수 기간
          </div>
          <div class="info-val" id="dReg" style="font-size:11px;line-height:1.6">–</div>
        </div>
        <div class="info-box">
          <div class="info-lbl">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            접수 상태
          </div>
          <div class="info-val" id="dStatus">–</div>
        </div>

        <div class="info-box full" id="dFeeBox" style="display:none;">
          <div class="info-lbl">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            참가비
          </div>
          <div class="fee-list" id="dFeeList"></div>
        </div>
      </div>

      <div class="d-section" id="dContactSection" style="display:none;">
        <div class="d-sec-title">문의</div>
        <a class="link-row" id="dPhoneRow" href="#" style="display:none;">
          <div class="link-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.06 6.06l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </div>
          <div class="link-body">
            <div class="link-label">전화 문의</div>
            <div class="link-url" id="dPhone">–</div>
          </div>
          <div class="link-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
        </a>
        <a class="link-row" id="dEmailRow" href="#" style="display:none;">
          <div class="link-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
          <div class="link-body">
            <div class="link-label">이메일 문의</div>
            <div class="link-url" id="dEmail">–</div>
          </div>
          <div class="link-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
        </a>
      </div>

      <div class="d-section">
        <div class="d-sec-title">공식 링크</div>

        <a class="link-row primary" id="dOfficialRow" href="#" target="_blank" rel="noopener" style="display:none;">
          <div class="link-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
          </div>
          <div class="link-body">
            <div class="link-label">공식 홈페이지</div>
            <div class="link-url" id="dOfficialUrl">–</div>
          </div>
          <div class="link-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
        </a>

        <a class="link-row" id="dNaverRow" href="#" target="_blank" rel="noopener">
          <div class="link-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </div>
          <div class="link-body">
            <div class="link-label">네이버에서 검색</div>
            <div class="link-url" id="dNaverQuery">–</div>
          </div>
          <div class="link-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
        </a>
      </div>

    </div>
    <div style="height: 20px;"></div>
  </div>

  <div class="cta-bar">
    <div class="cta-share" id="shareBtn" onclick="onShare()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--sub)" stroke-width="2">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
        <line x1="15.41" y1="6.51"  x2="8.59"  y2="10.49"/>
      </svg>
    </div>
    <button class="cta-reg" id="ctaBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
      대회 신청하기
    </button>
  </div>

</div>

<script src="app.js"></script>
<script>
  let race = null;
  const params = new URLSearchParams(location.search);
  const idx    = parseInt(params.get('i'));
  const source = params.get('source'); // 'ended' 이면 endedRaces에서 조회

  function updateWishIcon(wished) {
    document.getElementById('wishIcon').setAttribute('fill',   wished ? '#ff4d2e' : 'none');
    document.getElementById('wishIcon').setAttribute('stroke', wished ? '#ff4d2e' : 'white');
  }
  function onToggleWish() {
    if (!race) return;
    updateWishIcon(toggleWish(race.title));
  }
  function onShare() { if (race) shareRace(race); }

  function dcClass(c) {
    const l = c.toLowerCase();
    if (l.includes('100') || l.includes('70') || l.includes('50')) return 'dc-ultra';
    if (l === '풀'   || l.includes('42')) return 'dc-full';
    if (l === '하프' || l.includes('21')) return 'dc-half';
    if (l.includes('vk') || l.includes('kids') || l.includes('trail')) return 'dc-trail';
    return 'dc-short';
  }

  const STATUS_COLOR = {
    '접수중': 'var(--accent)', '마감': 'var(--muted)',
    '접수전': 'var(--blue)',   '종료': 'var(--muted)'
  };

  function friendlyDomain(url) {
    try { return new URL(url).hostname.replace('www.', ''); }
    catch { return url; }
  }

  (async () => {
    // 항상 loadRaces() 호출 → allRaces + endedRaces 둘 다 채워짐
    await loadRaces();

    // source=ended 이면 endedRaces에서, 아니면 allRaces에서 조회
    const pool = (source === 'ended') ? endedRaces : allRaces;

    // 뒤로가기 버튼 — 마감공고에서 왔으면 ended.html로
    document.getElementById('backBtn').href = (source === 'ended') ? 'ended.html' : 'index.html';

    if (isNaN(idx) || idx < 0 || idx >= pool.length) {
      document.getElementById('dTitle').textContent = '대회를 찾을 수 없어요';
      return;
    }

    race = pool[idx];
    const r = race;

    document.title = `런뉴 — ${r.title}`;
    document.getElementById('dTitle').textContent = r.title;

    document.getElementById('dCourses').innerHTML =
      (r.courses || []).map(c => `<span class="dc ${dcClass(c)}">${c}</span>`).join('');

    document.getElementById('dLocation').textContent = (r.region || '') + ' ' + (r.location || '');
    document.getElementById('dDate').textContent     = r.date + ' (' + r.dow + ')';
    document.getElementById('dReg').textContent      = r.reg_period || '–';

    const statusEl = document.getElementById('dStatus');
    statusEl.textContent = r.status || '–';
    statusEl.style.color = STATUS_COLOR[r.status] || 'var(--text)';

    // 참가비
    if (r.fees && r.fees.length > 0) {
      document.getElementById('dFeeBox').style.display = '';
      document.getElementById('dFeeList').innerHTML = r.fees.map(f =>
        `<div class="fee-item"><span class="fee-course">${f.course}</span><span class="fee-price">${f.price}</span></div>`
      ).join('');
    }

    // 문의
    if (r.contact && (r.contact.phone || r.contact.email)) {
      document.getElementById('dContactSection').style.display = '';
      if (r.contact.phone) {
        const el = document.getElementById('dPhoneRow');
        el.style.display = 'flex';
        el.href = `tel:${r.contact.phone.replace(/-/g, '')}`;
        document.getElementById('dPhone').textContent = r.contact.phone;
      }
      if (r.contact.email) {
        const el = document.getElementById('dEmailRow');
        el.style.display = 'flex';
        el.href = `mailto:${r.contact.email}`;
        document.getElementById('dEmail').textContent = r.contact.email;
      }
    }

    // 공식 홈페이지
    const officialRow = document.getElementById('dOfficialRow');
    if (r.official_url) {
      officialRow.style.display = 'flex';
      officialRow.href = r.official_url;
      document.getElementById('dOfficialUrl').textContent = friendlyDomain(r.official_url);
    }

    // 네이버 검색
    const naverUrl = `https://search.naver.com/search.naver?query=${encodeURIComponent(r.title)}`;
    document.getElementById('dNaverRow').href = naverUrl;
    document.getElementById('dNaverQuery').textContent = r.title;

    // CTA 버튼
    const targetUrl = r.official_url || naverUrl;
    const cta = document.getElementById('ctaBtn');
    if (r.status === '마감' || r.status === '종료') {
      cta.className = 'cta-reg closed';
      cta.innerHTML = '접수 마감';
      cta.onclick   = null;
    } else if (r.status === '접수전') {
      cta.className = 'cta-reg closed';
      cta.innerHTML = '접수 예정';
      cta.onclick   = null;
    } else {
      cta.className = 'cta-reg';
      cta.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg> 대회 신청하기`;
      cta.onclick   = () => window.open(targetUrl, '_blank');
    }

    updateWishIcon(wishlist.includes(r.title));
  })();
</script>
</body>
</html>
