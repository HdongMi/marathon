<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>런뉴 — 대회 일정</title>
<link rel="stylesheet" href="style.css">
<style>
  /* 화면이 브라우저 밖으로 길어지지 않게 앱처럼 100vh로 꽉 묶어줍니다 */
  .page { height: 100vh; max-height: 100vh; }
  
  /* 탭 콘텐츠 화면 구조 */
  .tab-content { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  .scroll-area { flex: 1; overflow-y: auto; }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* 히어로(상단 배경) 영역 전용 스타일 */
  .list-hero { position: relative; height: 220px; flex-shrink: 0; }
  .list-hero img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
  .list-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, var(--bg) 100%); }
  .list-hero-content { position: absolute; bottom: 20px; left: 20px; right: 20px; }
  .list-hero-content h1 { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: #fff; line-height: 1; letter-spacing: 2px; }
  .list-hero-content h1 span { color: var(--accent); }
  .hero-sub { font-size: 11px; color: rgba(255,255,255,.6); margin-top: 6px; }
</style>
</head>
<body>
<div class="page" id="app">

  <div id="tabList" class="tab-content">
    
    <div class="list-hero">
      <img src="https://images.unsplash.com/photo-1530549387789-4c1017266635?w=800&q=80" alt="마라톤">
      <div class="list-hero-overlay"></div>
      <div class="list-hero-content">
        <h1>RUN <span>NOW</span></h1>
        <div class="hero-sub">국내 마라톤 · 트레일 · 러닝 대회</div>
      </div>
    </div>

    <div class="update-banner">
      <div class="update-dot"></div>
      <span id="updateTime">데이터 로딩 중...</span>
    </div>

    <div class="scroll-area">
      <div class="filter-section">
        <div class="filter-top">
          <span class="filter-title">코스 종류</span>
          <button class="filter-reset" onclick="resetFilters()">전체 보기</button>
        </div>
        <div class="course-grid">
          <label class="c-check"><input type="checkbox" value="풀" onchange="applyFilter()"><div class="c-box"><span class="c-icon">🥇</span><span class="c-name">풀코스</span></div></label>
          <label class="c-check"><input type="checkbox" value="하프" onchange="applyFilter()"><div class="c-box"><span class="c-icon">🥈</span><span class="c-name">하프</span></div></label>
          <label class="c-check"><input type="checkbox" value="10km" onchange="applyFilter()"><div class="c-box"><span class="c-icon">🏃</span><span class="c-name">10km</span></div></label>
          <label class="c-check"><input type="checkbox" value="5km" onchange="applyFilter()"><div class="c-box"><span class="c-icon">👟</span><span class="c-name">5km</span></div></label>
        </div>
        <div class="open-toggle-row">
          <span class="open-toggle-label">접수중인 대회만 보기</span>
          <div class="tog" id="openTog" onclick="toggleOpen()"><div class="tog-knob"></div></div>
        </div>
      </div>

      <div class="count-row">
        <span class="count-label">총 <strong id="raceCount">–</strong>개 대회</span>
      </div>

      <div class="race-list" id="raceList">
        <div class="state-box">
          <div class="spinner"></div>
          <div class="state-text">대회 정보를 불러오는 중...</div>
        </div>
      </div>
    </div>
  </div>

  <div id="tabMy" class="tab-content" style="display:none;">
    <div class="scroll-area">
      
      <div class="my-header">
        <div id="myAvatarWrap"></div>
        <div>
          <div class="my-name" id="myName">–</div>
          <div class="my-email" id="myEmail">–</div>
          <div class="my-badge" id="myBadge"></div>
        </div>
      </div>

      <div class="my-section">
        <div class="my-sec-title">내 활동</div>
        <a class="my-item" href="wishlist.html">
          <div class="my-item-icon">❤️</div>
          <div class="my-item-label">찜한 대회</div>
          <span class="my-item-count" id="wishCount">0</span>
          <div class="my-item-arrow">›</div>
        </a>
      </div>

      <div class="my-section">
        <div class="my-sec-title">계정</div>
        <div class="logout-row" onclick="doLogout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          로그아웃
        </div>
      </div>

    </div>
  </div>

  <nav class="tab-bar">
    <button class="tab-btn active" id="btn-list" onclick="showTab('list')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      대회목록
    </button>
    <button class="tab-btn" id="btn-my" onclick="showTab('my')" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      마이
    </button>
  </nav>

</div>

<script src="app.js"></script>
<script>
  function showTab(tab) {
    document.getElementById('tabList').style.display = tab === 'list' ? 'flex' : 'none';
    document.getElementById('tabMy').style.display   = tab === 'my'   ? 'flex' : 'none';
    document.getElementById('btn-list').classList.toggle('active', tab === 'list');
    document.getElementById('btn-my').classList.toggle('active',   tab === 'my');
  }

  function renderMy() {
    if (!currentUser) return;
    document.getElementById('myName').textContent  = currentUser.name || '유저';
    document.getElementById('myEmail').textContent = currentUser.email || '이메일 없음';
    
    const wrap = document.getElementById('myAvatarWrap');
    wrap.innerHTML = currentUser.photo
      ? `<div class="my-avatar"><img src="${currentUser.photo}" alt="프로필"></div>`
      : `<div class="my-avatar-ph">${(currentUser.name || 'U')[0]}</div>`;
    
    const badge = document.getElementById('myBadge');
    badge.className = 'my-badge ' + (currentUser.provider === 'kakao' ? 'kakao' : 'google');
    badge.textContent = currentUser.provider === 'kakao' ? '카카오 로그인' : 'Google 로그인';
    
    if(typeof getWishCount === 'function') document.getElementById('wishCount').textContent = getWishCount();
  }

  (async () => {
    if (!restoreSession()) {
      window.location.href = getBasePath() + 'login.html';
      return;
    }
    
    document.getElementById('btn-my').style.display = 'flex';
    renderMy();

    const races = await loadRaces();
    if (!races || races.length === 0) {
      document.getElementById('raceList').innerHTML = `<div class="state-box"><div style="font-size:36px">⚠️</div><div class="state-text">대회 정보가 없습니다.</div></div>`;
    } else {
      if(typeof applyFilter === 'function') applyFilter(); 
      else if(typeof render === 'function') render(races);
    }
  })();
</script>
</body>
</html>
