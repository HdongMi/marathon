<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>런뉴 - 마라톤 & 러닝 대회</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
  integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
  crossorigin="anonymous"></script>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d0d0f;--surface:#161619;--surface2:#1e1e23;
    --border:rgba(255,255,255,.07);--text:#f0f0f2;--text-muted:#7a7a8a;
    --accent:#e8f000;--accent2:#ff4d2e;--accent3:#00c9a7;--radius:16px;
  }
  html,body{
    height:100%;background:#000;
    display:flex;justify-content:center;align-items:flex-start;
    font-family:'Noto Sans KR',sans-serif;
  }
  #phone{
    width:390px;min-height:100vh;background:var(--bg);
    display:flex;flex-direction:column;overflow:hidden;position:relative;
  }

  /* ══ 화면 전환 ══ */
  .screen{display:none;flex-direction:column;flex:1;overflow:hidden}
  .screen.active{display:flex}

  /* ════════════════════════════════
     1. 로그인 스플래시 화면
  ════════════════════════════════ */
  #screen-login{
    background:var(--bg);
    position:relative;overflow:hidden;
  }
  /* 배경 히어로 이미지 */
  .login-bg{
    position:absolute;inset:0;
    background:url('https://images.unsplash.com/photo-1530549387789-4c1017266635?w=800&q=80') center/cover;
    filter:brightness(.35);
  }
  .login-bg-grad{
    position:absolute;inset:0;
    background:linear-gradient(to bottom, transparent 30%, var(--bg) 80%);
  }
  .login-content{
    position:relative;z-index:1;
    flex:1;display:flex;flex-direction:column;
    justify-content:flex-end;padding:0 28px 48px;
  }
  /* 로고 */
  .login-logo{
    font-family:'Bebas Neue',sans-serif;
    font-size:64px;letter-spacing:4px;color:#fff;line-height:1;
    margin-bottom:4px;
  }
  .login-logo span{color:var(--accent)}
  .login-tagline{
    font-size:13px;color:rgba(255,255,255,.55);
    font-weight:300;letter-spacing:1.5px;text-transform:uppercase;
    margin-bottom:40px;
  }
  /* 로그인 버튼들 */
  .login-buttons{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
  .btn-kakao{
    width:100%;height:52px;border-radius:14px;
    background:#FEE500;border:none;
    display:flex;align-items:center;justify-content:center;gap:10px;
    font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;
    color:rgba(0,0,0,.85);cursor:pointer;transition:opacity .15s;
  }
  .btn-kakao:active{opacity:.82}
  .btn-google{
    width:100%;height:52px;border-radius:14px;
    background:#fff;border:none;
    display:flex;align-items:center;justify-content:center;gap:10px;
    font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;
    color:#333;cursor:pointer;transition:opacity .15s;
  }
  .btn-google:active{opacity:.82}
  .btn-skip{
    width:100%;padding:14px;background:none;border:none;
    font-family:'Noto Sans KR',sans-serif;font-size:13px;
    color:rgba(255,255,255,.35);cursor:pointer;
    text-decoration:underline;text-underline-offset:3px;
    transition:color .15s;
  }
  .btn-skip:active{color:rgba(255,255,255,.6)}
  .login-notice{
    font-size:10px;color:rgba(255,255,255,.25);
    text-align:center;line-height:1.7;margin-top:6px;
  }

  /* ════════════════════════════════
     탭바 (목록 + 마이)
  ════════════════════════════════ */
  .tab-bar{
    display:flex;background:var(--surface);
    border-top:1px solid var(--border);flex-shrink:0;
  }
  .tab-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:3px;padding:10px 0 12px;
    border:none;background:none;color:var(--text-muted);
    font-family:'Noto Sans KR',sans-serif;font-size:10px;
    cursor:pointer;transition:color .2s;
  }
  .tab-btn svg{width:22px;height:22px}
  .tab-btn.active{color:var(--accent)}

  /* ════════════════════════════════
     2. 대회목록 화면
  ════════════════════════════════ */
  .list-hero{position:relative;height:180px;overflow:hidden;flex-shrink:0}
  .list-hero img{width:100%;height:100%;object-fit:cover;filter:brightness(.45)}
  .list-hero-overlay{
    position:absolute;inset:0;
    background:linear-gradient(to bottom,transparent 20%,var(--bg) 100%);
  }
  .list-hero-content{position:absolute;bottom:16px;left:20px;right:20px}
  .list-hero-content h1{
    font-family:'Bebas Neue',sans-serif;font-size:36px;
    letter-spacing:2px;color:#fff;line-height:1;
  }
  .list-hero-content h1 span{color:var(--accent)}
  .hero-sub{
    font-size:10px;color:rgba(255,255,255,.5);margin-top:3px;
    font-weight:300;letter-spacing:1px;text-transform:uppercase;
  }

  /* 업데이트 배너 */
  .update-banner{
    display:flex;align-items:center;gap:6px;padding:7px 16px;
    background:rgba(232,240,0,.05);border-bottom:1px solid rgba(232,240,0,.08);
    font-size:11px;color:var(--text-muted);flex-shrink:0;
  }
  .update-dot{
    width:6px;height:6px;border-radius:50%;background:var(--accent);
    flex-shrink:0;animation:pulse 2s infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* 코스 필터 */
  .filter-section{
    padding:12px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;
  }
  .filter-top{
    display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
  }
  .filter-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px}
  .filter-reset{
    font-size:11px;color:var(--accent);font-weight:600;
    cursor:pointer;background:none;border:none;font-family:'Noto Sans KR',sans-serif;padding:0;
  }
  .course-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .c-check{display:contents}
  .c-check input[type=checkbox]{display:none}
  .c-box{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    padding:9px 6px;border-radius:12px;border:1.5px solid var(--border);
    background:var(--surface2);cursor:pointer;transition:all .18s;user-select:none;
  }
  .c-check input:checked+.c-box{border-color:var(--accent);background:rgba(232,240,0,.1)}
  .c-icon{font-size:18px;line-height:1}
  .c-name{font-size:11px;font-weight:700;color:var(--text-muted);transition:color .18s}
  .c-check input:checked+.c-box .c-name{color:var(--accent)}
  .open-toggle-row{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:10px;padding-top:10px;border-top:1px solid var(--border);
  }
  .open-toggle-label{font-size:12px;color:var(--text-muted);font-weight:500}
  .tog{
    width:42px;height:24px;border-radius:12px;
    background:var(--surface2);border:1.5px solid var(--border);
    position:relative;cursor:pointer;transition:all .2s;flex-shrink:0;
  }
  .tog.on{background:var(--accent);border-color:var(--accent)}
  .tog-knob{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:var(--text-muted);transition:all .2s}
  .tog.on .tog-knob{left:20px;background:#000}

  .count-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:8px 16px 6px;flex-shrink:0;
  }
  .count-label{font-size:12px;color:var(--text-muted)}
  .count-label strong{color:var(--text)}

  /* 목록 */
  .race-list{flex:1;overflow-y:auto;padding:0 16px 16px}
  .race-list::-webkit-scrollbar{display:none}

  /* 상태 박스 */
  .state-box{
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:60px 20px;gap:12px;text-align:center;
  }
  .spinner{
    width:38px;height:38px;border:3px solid var(--surface2);
    border-top-color:var(--accent);border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .state-text{font-size:13px;color:var(--text-muted);line-height:1.6}
  .retry-btn{
    padding:10px 24px;border-radius:10px;background:var(--accent);color:#000;
    font-weight:700;border:none;cursor:pointer;
    font-family:'Noto Sans KR',sans-serif;font-size:13px;
  }

  /* 카드 */
  .race-card{
    display:flex;gap:12px;padding:14px;background:var(--surface);
    border-radius:var(--radius);margin-bottom:10px;border:1px solid var(--border);
    cursor:pointer;transition:transform .15s;position:relative;overflow:hidden;
  }
  .race-card::before{
    content:'';position:absolute;left:0;top:0;bottom:0;
    width:3px;background:var(--accent);border-radius:3px 0 0 3px;
    opacity:0;transition:opacity .15s;
  }
  .race-card:active{transform:scale(.98)}
  .race-card:active::before{opacity:1}
  .date-box{
    flex-shrink:0;width:50px;text-align:center;
    background:var(--surface2);border-radius:10px;padding:8px 4px;border:1px solid var(--border);
  }
  .date-box .mo{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px}
  .date-box .dy{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--text);line-height:1}
  .date-box .dw{font-size:10px;color:var(--text-muted);margin-top:2px}
  .card-info{flex:1;min-width:0}
  .badges{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap}
  .b{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.5px}
  .b-full {background:rgba(232,240,0,.15);color:var(--accent); border:1px solid rgba(232,240,0,.3)}
  .b-half {background:rgba(0,201,167,.15);color:var(--accent3);border:1px solid rgba(0,201,167,.3)}
  .b-10k  {background:rgba(255,77,46,.15);color:var(--accent2);border:1px solid rgba(255,77,46,.3)}
  .b-5k   {background:rgba(0,180,255,.15);color:#00b4ff;       border:1px solid rgba(0,180,255,.3)}
  .b-ultra{background:rgba(255,160,0,.15);color:#ffa500;       border:1px solid rgba(255,160,0,.3)}
  .b-trail{background:rgba(120,100,255,.15);color:#a88fff;     border:1px solid rgba(120,100,255,.3)}
  .card-title{
    font-size:14px;font-weight:700;color:var(--text);
    margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .card-meta{font-size:11px;color:var(--text-muted)}
  .card-right{flex-shrink:0;display:flex;align-items:center}
  .dday{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;padding:4px 9px;border-radius:6px}
  .dday.open  {background:rgba(232,240,0,.15);color:var(--accent)}
  .dday.close {background:var(--surface2);    color:var(--text-muted)}
  .dday.soon  {background:rgba(255,77,46,.15);color:var(--accent2)}
  .dday.before{background:rgba(0,180,255,.1); color:#00b4ff}

  /* ════════════════════════════════
     3. 상세 화면
  ════════════════════════════════ */
  #screen-detail{background:var(--bg)}
  .d-scroll{flex:1;overflow-y:auto}
  .d-scroll::-webkit-scrollbar{display:none}
  .d-hero{position:relative;height:240px;overflow:hidden}
  .d-hero img{width:100%;height:100%;object-fit:cover;filter:brightness(.55)}
  .d-hero-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.25) 0%,var(--bg) 100%)}
  .d-back{
    position:absolute;top:16px;left:16px;width:38px;height:38px;
    background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.15);border-radius:50%;
    display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(10px);
  }
  .d-wish{
    position:absolute;top:16px;right:16px;width:38px;height:38px;
    background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.15);border-radius:50%;
    display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(10px);
  }
  .d-hero-txt{position:absolute;bottom:20px;left:20px;right:70px}
  .d-hero-txt h2{
    font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;
    color:#fff;line-height:1.15;text-shadow:0 2px 12px rgba(0,0,0,.6);
  }
  .d-body{padding:20px}
  .d-courses{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .dc{padding:7px 14px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px}
  .dc-full {background:rgba(232,240,0,.15);color:var(--accent); border:1px solid rgba(232,240,0,.3)}
  .dc-half {background:rgba(0,201,167,.15);color:var(--accent3);border:1px solid rgba(0,201,167,.3)}
  .dc-trail{background:rgba(120,100,255,.15);color:#a88fff;    border:1px solid rgba(120,100,255,.3)}
  .dc-short{background:rgba(0,180,255,.15);color:#00b4ff;      border:1px solid rgba(0,180,255,.3)}
  .dc-ultra{background:rgba(255,160,0,.15);color:#ffa500;      border:1px solid rgba(255,160,0,.3)}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
  .info-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px}
  .info-box.hi{border-color:rgba(232,240,0,.25)}
  .info-lbl{font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
  .info-val{font-size:13px;color:var(--text);font-weight:700;line-height:1.4}
  .d-section{margin-bottom:22px}
  .d-sec-title{
    font-size:11px;font-weight:700;color:var(--text-muted);
    text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;
    display:flex;align-items:center;gap:8px;
  }
  .d-sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
  .link-row{
    display:flex;align-items:center;gap:10px;padding:12px;
    background:var(--surface);border:1px solid var(--border);
    border-radius:10px;cursor:pointer;transition:border-color .2s;
  }
  .link-row:active{border-color:var(--accent)}
  .link-icon{width:32px;height:32px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
  .link-text{font-size:13px;color:var(--text);font-weight:500}
  .cta-bar{
    padding:10px 20px 16px;
    background:linear-gradient(to top,var(--bg) 60%,transparent);
    display:flex;gap:10px;flex-shrink:0;
  }
  .cta-share{
    width:50px;height:50px;border-radius:14px;
    border:1px solid var(--border);background:var(--surface);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .cta-reg{
    flex:1;height:50px;border-radius:14px;background:var(--accent);border:none;
    font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;color:#000;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s;
  }
  .cta-reg.closed{background:var(--surface2);color:var(--text-muted);cursor:default}
  .cta-reg:not(.closed):active{transform:scale(.97)}

  /* ════════════════════════════════
     4. 마이페이지
  ════════════════════════════════ */
  #screen-my{background:var(--bg)}
  .my-scroll{flex:1;overflow-y:auto}
  .my-scroll::-webkit-scrollbar{display:none}
  .my-header{
    padding:28px 20px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0;
  }
  .my-avatar{
    width:64px;height:64px;border-radius:20px;overflow:hidden;
    flex-shrink:0;background:var(--surface2);border:2px solid var(--border);
  }
  .my-avatar img{width:100%;height:100%;object-fit:cover}
  .my-avatar-ph{
    width:64px;height:64px;border-radius:20px;
    background:linear-gradient(135deg,var(--accent),var(--accent3));
    display:flex;align-items:center;justify-content:center;
    font-family:'Bebas Neue',sans-serif;font-size:26px;color:#000;flex-shrink:0;
  }
  .my-name{font-size:18px;font-weight:700;color:var(--text)}
  .my-email{font-size:12px;color:var(--text-muted);margin-top:2px}
  .my-badge{
    display:inline-flex;align-items:center;gap:4px;margin-top:6px;
    padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;
  }
  .my-badge.kakao{background:rgba(254,229,0,.15);color:#c8a800;border:1px solid rgba(254,229,0,.3)}
  .my-badge.google{background:rgba(66,133,244,.15);color:#4285f4;border:1px solid rgba(66,133,244,.3)}
  .my-section{padding:0 20px 16px}
  .my-sec-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
  .my-item{
    display:flex;align-items:center;gap:12px;padding:14px;
    background:var(--surface);border:1px solid var(--border);
    border-radius:12px;margin-bottom:6px;cursor:pointer;transition:border-color .15s;
  }
  .my-item:active{border-color:var(--accent)}
  .my-item-icon{width:36px;height:36px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .my-item-label{flex:1;font-size:14px;font-weight:600;color:var(--text)}
  .my-item-count{font-size:12px;color:var(--accent);font-weight:700;margin-right:4px}
  .my-item-arrow{color:var(--text-muted);font-size:16px}
  .logout-row{
    margin:0 20px 28px;padding:14px;
    background:var(--surface);border:1px solid var(--border);
    border-radius:12px;display:flex;align-items:center;justify-content:center;
    gap:8px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
    font-size:14px;font-weight:600;color:var(--accent2);transition:border-color .15s;
  }
  .logout-row:active{border-color:var(--accent2)}

  /* 찜 서브 화면 */
  #screen-wishlist{background:var(--bg)}
  .sub-header{
    display:flex;align-items:center;gap:12px;
    padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0;
  }
  .sub-back{
    width:36px;height:36px;border-radius:50%;
    background:var(--surface2);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
  }
  .sub-title{font-size:17px;font-weight:700;color:var(--text)}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .race-card{animation:fadeUp .3s ease both}
  @keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
  .login-content{animation:slideUp .5s ease both}
  @media(max-width:420px){#phone{width:100%}}
</style>
</head>
<body>
<div id="phone">

  <!-- ══ 1. 로그인 스플래시 ══ -->
  <div class="screen active" id="screen-login">
    <div class="login-bg"></div>
    <div class="login-bg-grad"></div>
    <div class="login-content">
      <div class="login-logo">RUN<span>NU</span></div>
      <div class="login-tagline">국내 마라톤 · 트레일 · 러닝 대회</div>
      <div class="login-buttons">
        <!-- 카카오 -->
        <button class="btn-kakao" onclick="loginKakao()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="rgba(0,0,0,.85)">
            <path d="M12 3C6.477 3 2 6.477 2 10.857c0 2.787 1.637 5.232 4.1 6.698l-1.045 3.9c-.09.337.295.608.587.41L10.1 19.3c.624.087 1.258.132 1.9.132 5.523 0 10-3.477 10-7.857C22 6.477 17.523 3 12 3z"/>
          </svg>
          카카오로 시작하기
        </button>
        <!-- 구글 -->
        <button class="btn-google" onclick="loginGoogle()">
          <svg width="20" height="20" viewBox="0 0 24 24">

            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>

  <!-- ══ 2. 대회 목록 ══ -->

        <label class="c-check"><input type="checkbox" value="하프" onchange="applyFilter()"><div class="c-box"><span class="c-icon">🥈</span><span class="c-name">하프</span></div></label>
        <label class="c-check"><input type="checkbox" value="10km" onchange="applyFilter()"><div class="c-box"><span class="c-icon">🏃</span><span class="c-name">10km</span></div></label>
        <label class="c-check"><input type="checkbox" value="5km" onchange="applyFilter()"><div class="c-box"><span class="c-icon">👟</span><span class="c-name">5km</span></div></label>
      </div>

        <span class="open-toggle-label">접수중인 대회만 보기</span>

      <div class="state-box"><div class="spinner"></div><div class="state-text">대회 정보를 불러오는 중...</div></div>

  <!-- ══ 3. 상세 ══ -->
  <div class="screen" id="screen-detail">
    <div class="d-scroll">
      <div class="d-hero">

        <div class="d-hero-grad"></div>
        <div class="d-back" onclick="goBack()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        </div>
        <div class="d-wish" onclick="toggleWish()">
          <svg id="wishIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <div class="d-hero-txt"><h2 id="dTitle"></h2></div>
      </div>
      <div class="d-body">
        <div class="d-courses" id="dCourses"></div>
        <div class="info-grid">
          <div class="info-box"><div class="info-lbl">📍 장소</div><div class="info-val" id="dLocation">–</div></div>
          <div class="info-box hi"><div class="info-lbl">📅 대회일</div><div class="info-val" id="dDate">–</div></div>
          <div class="info-box"><div class="info-lbl">📋 접수 기간</div><div class="info-val" id="dReg" style="font-size:11px;line-height:1.6">–</div></div>
          <div class="info-box"><div class="info-lbl">🏁 접수 상태</div><div class="info-val" id="dStatus">–</div></div>
        </div>
        <div class="d-section">
          <div class="d-sec-title">공식 링크</div>
          <div class="link-row" onclick="openUrl()">
            <div class="link-icon">🌐</div>
            <div class="link-text" id="dLink">marathongo.co.kr</div>
          </div>
        </div>

      <div style="height:90px"></div>
    </div>
    <div class="cta-bar">
      <div class="cta-share" onclick="shareRace()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </div>
      <button class="cta-reg" id="ctaBtn" onclick="openUrl()">

          <div class="my-badge" id="myBadge"></div>

        </div>

  <div class="screen" id="screen-wishlist">

      <div class="sub-back" onclick="switchTab('my')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </div>

    </div>

      <div class="state-box"><div style="font-size:36px">❤️</div><div class="state-text" style="margin-top:8px">찜한 대회가 없어요</div></div>
    </div>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      대회목록
    </button>
    <button class="tab-btn" id="tab-my" onclick="switchTab('my')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      마이
    </button>
  </div>

</div><!-- /phone -->

<script>
  /* ══ 설정 ══ */
  const KAKAO_KEY     = '6dc88714f7ade5205b72b9a2a991d530';
  const GOOGLE_CID    = '372085184739-6vp986ob9sa277cvcdfeill8se8i9hpg.apps.googleusercontent.com';

  /* ══ 전역 상태 ══ */
  let allRaces=[], selectedRace=null, openOnly=false;
  let currentUser=null, wishlist=[], currentTab='list', prevTab='list';
  const MON=['','JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

  /* ══ 카카오 초기화 ══ */
  Kakao.init(KAKAO_KEY);

  /* ══ 로그인 함수 ══ */
  function loginKakao(){
    Kakao.Auth.login({
      success(){
        Kakao.API.request({
          url:'/v2/user/me',
          success(res){
            const k=res.kakao_account;
            afterLogin({
              name: k?.profile?.nickname||'카카오 유저',
              email: k?.email||'',
              photo: k?.profile?.profile_image_url||'',
              provider:'kakao'
            });
          },
          fail(e){ alert('카카오 정보 오류: '+JSON.stringify(e)); }
        });
      },
      fail(e){ alert('카카오 로그인 실패: '+JSON.stringify(e)); }
    });
  }

  function loginGoogle(){
    google.accounts.id.initialize({
      client_id: GOOGLE_CID,
      callback: (res)=>{
        const p=JSON.parse(atob(res.credential.split('.')[1]));
        afterLogin({name:p.name||'Google 유저',email:p.email||'',photo:p.picture||'',provider:'google'});
      },
      ux_mode:'popup'
    });
    google.accounts.id.prompt(n=>{
      if(n.isNotDisplayed()||n.isSkippedMoment()){
        // 팝업 fallback
        const params=new URLSearchParams({
          client_id:GOOGLE_CID,
          redirect_uri:location.origin+location.pathname,
          response_type:'token',
          scope:'openid email profile',
          prompt:'select_account'
        });
        const popup=window.open('https://accounts.google.com/o/oauth2/v2/auth?'+params,'glogin','width=480,height=600');
        const t=setInterval(()=>{
          try{
            if(popup.closed){clearInterval(t);return}
            const u=popup.location.href;
            if(u.includes('access_token')){
              clearInterval(t);popup.close();
              const h=new URLSearchParams(u.split('#')[1]);
              fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+h.get('access_token')}})
                .then(r=>r.json()).then(u=>afterLogin({name:u.name||'Google 유저',email:u.email||'',photo:u.picture||'',provider:'google'}));
            }
          }catch(e){}
        },300);
      }
    });
  }

  function skipLogin(){
    // 비로그인으로 둘러보기 — 마이탭 없이 목록만
    enterApp(null);
  }

  function afterLogin(user){
    currentUser=user;
    localStorage.setItem('runnu_user',JSON.stringify(user));
    wishlist=JSON.parse(localStorage.getItem('runnu_wish_'+(user.email||'guest'))||'[]');
    enterApp(user);
  }

  function enterApp(user){
    // 로그인 화면 → 대회목록으로 전환
    document.getElementById('screen-login').classList.remove('active');
    document.getElementById('screen-list').classList.add('active');
    document.getElementById('tabBar').style.display = user ? 'flex' : 'none';
    currentTab='list';

    if(user) renderMyPage(user);
    loadRaces();
  }

  /* ══ 마이페이지 렌더 ══ */
  function renderMyPage(user){
    document.getElementById('myName').textContent=user.name;
    document.getElementById('myEmail').textContent=user.email||'이메일 없음';
    const wrap=document.getElementById('myAvatarWrap');
    wrap.innerHTML=user.photo
      ?`<div class="my-avatar"><img src="${user.photo}" alt="프로필"></div>`
      :`<div class="my-avatar-ph">${user.name[0]}</div>`;
    const badge=document.getElementById('myBadge');
    badge.className='my-badge '+(user.provider==='kakao'?'kakao':'google');
    badge.textContent=user.provider==='kakao'?'카카오 로그인':'Google 로그인';
    updateWishCount();
  }

  /* ══ 로그아웃 ══ */
  function doLogout(){
    if(!confirm('로그아웃 하시겠어요?')) return;
    if(currentUser?.provider==='kakao') Kakao.Auth.logout(()=>{});
    currentUser=null;
    localStorage.removeItem('runnu_user');
    wishlist=[];
    // 다시 로그인 화면
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('screen-login').classList.add('active');
    document.getElementById('tabBar').style.display='none';
  }

  /* ══ 탭 전환 ══ */
  const ALL_TABS=['list','my','wishlist'];
  function switchTab(tab){
    if(tab!=='wishlist') prevTab=tab;
    ALL_TABS.forEach(t=>{
      document.getElementById('screen-'+t)?.classList.remove('active');
      document.getElementById('tab-'+t)?.classList.remove('active');
    });
    document.getElementById('screen-'+tab).classList.add('active');
    document.getElementById('tab-'+tab)?.classList.add('active');
    currentTab=tab;
    document.getElementById('tabBar').style.display=(tab==='wishlist')?'none':'flex';
  }

  /* ══ 찜 ══ */
  function toggleWish(){
    if(!currentUser){
      const ok=confirm('찜 기능은 로그인이 필요해요.\n로그인 화면으로 이동할까요?');
      if(ok) doLogout();
      return;
    }
    const title=selectedRace?.title; if(!title) return;
    const idx=wishlist.indexOf(title);
    if(idx===-1) wishlist.push(title); else wishlist.splice(idx,1);
    localStorage.setItem('runnu_wish_'+(currentUser.email||'guest'),JSON.stringify(wishlist));
    updateWishIcon(); updateWishCount();
  }
  function updateWishIcon(){
    const on=wishlist.includes(selectedRace?.title);
    document.getElementById('wishIcon').setAttribute('fill',on?'#ff4d2e':'none');
    document.getElementById('wishIcon').setAttribute('stroke',on?'#ff4d2e':'white');
  }
  function updateWishCount(){ document.getElementById('wishCount').textContent=wishlist.length; }
  function showWishlist(){
    const el=document.getElementById('wishList');
    const list=allRaces.filter(r=>wishlist.includes(r.title));
    el.innerHTML=list.length
      ?list.map((r,i)=>cardHtml(r,i)).join('')
      :`<div class="state-box"><div style="font-size:36px">❤️</div><div class="state-text" style="margin-top:8px">찜한 대회가 없어요</div></div>`;
    switchTab('wishlist');
  }

  /* ══ 데이터 로드 ══ */
  async function loadRaces(){
    try{
      const res=await fetch(`races.json?t=${Date.now()}`);
      if(!res.ok) throw new Error(res.status);
      const data=await res.json();
      allRaces=data.races||[];
      document.getElementById('updateTime').textContent=
        data.updated_at?`마지막 업데이트: ${data.updated_at} · 매주 월요일 자동 갱신`:'데이터 로드 완료';
      applyFilter();
    }catch(e){
      document.getElementById('raceList').innerHTML=`
        <div class="state-box">
          <div style="font-size:36px">⚠️</div>
          <div class="state-text">대회 정보를 불러오지 못했어요.<br>races.json을 확인해주세요.</div>
          <button class="retry-btn" onclick="loadRaces()">다시 시도</button>
        </div>`;
      document.getElementById('updateTime').textContent='로드 실패';
    }
  }

  /* ══ 필터 ══ */
  function applyFilter(){
    const checked=[...document.querySelectorAll('.c-check input:checked')].map(el=>el.value);
    let list=allRaces.slice();
    if(checked.length){
      list=list.filter(r=>{
        const cs=(r.courses||[]).map(c=>c.toLowerCase());
        return checked.some(sel=>{
          if(sel==='풀')   return cs.some(c=>c==='풀'||c.includes('42'));
          if(sel==='하프') return cs.some(c=>c==='하프'||c.includes('21'));
          if(sel==='10km') return cs.some(c=>c.includes('10'));
          if(sel==='5km')  return cs.some(c=>c==='5km'||c==='5k');
          return false;
        });
      });
    }
    if(openOnly) list=list.filter(r=>r.status==='접수중');
    render(list);
  }
  function resetFilters(){ document.querySelectorAll('.c-check input').forEach(el=>el.checked=false); applyFilter(); }
  function toggleOpen(){ openOnly=!openOnly; document.getElementById('openTog').classList.toggle('on',openOnly); applyFilter(); }

  /* ══ 렌더 ══ */
  function badge(c){
    const l=c.toLowerCase();
    if(l.includes('100')||l.includes('70')||l.includes('50')) return`<span class="b b-ultra">${c}</span>`;
    if(l==='풀'||l.includes('42'))   return`<span class="b b-full">FULL</span>`;
    if(l==='하프'||l.includes('21')) return`<span class="b b-half">HALF</span>`;
    if(l.includes('10'))              return`<span class="b b-10k">10K</span>`;
    if(l.includes('5'))               return`<span class="b b-5k">5K</span>`;
    return`<span class="b b-trail">${c}</span>`;
  }
  function ddayHtml(r){
    if(r.status==='마감')   return`<div class="dday close">마감</div>`;
    if(r.status==='접수전') return`<div class="dday before">접수전</div>`;
    const today=new Date(); today.setHours(0,0,0,0);
    const diff=Math.ceil((new Date(r.date)-today)/86400000);
    if(diff<0)  return`<div class="dday close">종료</div>`;
    if(diff===0) return`<div class="dday soon">D-DAY</div>`;
    if(diff<=7)  return`<div class="dday soon">D-${diff}</div>`;
    return`<div class="dday open">접수중</div>`;
  }
  function cardHtml(r,i){
    return`
      <div class="race-card" style="animation-delay:${Math.min(i*40,300)}ms" onclick="showDetail(${allRaces.indexOf(r)})">
        <div class="date-box">
          <div class="mo">${MON[r.month]||''}</div>
          <div class="dy">${r.day}</div>
          <div class="dw">${r.dow}</div>
        </div>
        <div class="card-info">
          <div class="badges">${(r.courses||[]).slice(0,3).map(badge).join('')}</div>
          <div class="card-title">${r.title}</div>
          <div class="card-meta">📍 ${r.region||''} ${r.location||''}</div>
        </div>
        <div class="card-right">${ddayHtml(r)}</div>
      </div>`;
  }
  function render(list){
    document.getElementById('raceCount').textContent=list.length;
    const el=document.getElementById('raceList');
    if(!list.length){
      el.innerHTML=`<div class="state-box"><div style="font-size:36px">🏅</div><div class="state-text" style="margin-top:8px">해당 조건의 대회가 없어요</div></div>`;
      return;
    }
    el.innerHTML=list.map((r,i)=>cardHtml(r,i)).join('');
  }

  /* ══ 상세 ══ */
  function showDetail(idx){
    selectedRace=allRaces[idx]; const r=selectedRace;
    document.getElementById('dTitle').textContent=r.title;
    document.getElementById('dLocation').textContent=(r.region||'')+' '+(r.location||'');
    document.getElementById('dDate').textContent=r.date+' ('+r.dow+')';
    document.getElementById('dReg').textContent=r.reg_period||'–';
    const sc={'접수중':'var(--accent)','마감':'var(--text-muted)','접수전':'#00b4ff','종료':'var(--text-muted)'};
    const se=document.getElementById('dStatus'); se.textContent=r.status||'–'; se.style.color=sc[r.status]||'var(--text)';
    document.getElementById('dCourses').innerHTML=(r.courses||[]).map(c=>{
      const cl=c.toLowerCase();
      let t='dc-short';
      if(cl.includes('100')||cl.includes('70')||cl.includes('50')) t='dc-ultra';
      else if(cl==='풀'||cl.includes('42')) t='dc-full';
      else if(cl==='하프'||cl.includes('21')) t='dc-half';
      else if(cl.includes('vk')||cl.includes('kids')||cl.includes('trail')) t='dc-trail';
      return`<span class="dc ${t}">${c}</span>`;
    }).join('');
    const cta=document.getElementById('ctaBtn');
    if(r.status==='마감'||r.status==='종료'){ cta.className='cta-reg closed'; cta.textContent='접수 마감'; }
    else{ cta.className='cta-reg'; cta.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg> 대회 신청하기`; }
    document.getElementById('dLink').textContent=(r.detail_url||'marathongo.co.kr').replace('https://','');
    updateWishIcon();
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('screen-detail').classList.add('active');
    document.getElementById('tabBar').style.display='none';
    document.querySelector('.d-scroll').scrollTop=0;
  }
  function goBack(){
    document.getElementById('screen-detail').classList.remove('active');
    document.getElementById('screen-'+currentTab).classList.add('active');
    if(currentUser) document.getElementById('tabBar').style.display='flex';
  }
  function openUrl(){ if(selectedRace?.detail_url) window.open(selectedRace.detail_url,'_blank'); }
  function shareRace(){
    if(!selectedRace) return;
    const text=`[런뉴] ${selectedRace.title}\n📅 ${selectedRace.date}\n📍 ${selectedRace.location||''}`;
    if(navigator.share) navigator.share({title:selectedRace.title,text,url:selectedRace.detail_url||location.href});
    else if(navigator.clipboard) navigator.clipboard.writeText(text).then(()=>alert('클립보드에 복사됐어요!'));
  }

  /* ══ 초기화: 로그인 유지 ══ */
  const saved=localStorage.getItem('runnu_user');
  if(saved){
    const u=JSON.parse(saved);
    wishlist=JSON.parse(localStorage.getItem('runnu_wish_'+(u.email||'guest'))||'[]');
    afterLogin(u);
  }
</script>
</body>
