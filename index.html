<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>런뉴 — 대회 일정</title>
<link rel="stylesheet" href="style.css"> <style>
  /* 기본 화면 세팅 (style.css가 있다면 거기에 맞춰서 예쁘게 나올 겁니다) */
  body { background: #121212; color: #fff; font-family: 'Noto Sans KR', sans-serif; padding: 20px; margin: 0; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; }
  .logo span { color: #FF4B2B; }
  .btn-logout { background: #333; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 13px; }
  
  /* app.js가 렌더링할 때 필요한 최소한의 CSS */
  #raceList { display: flex; flex-direction: column; gap: 15px; }
  .race-card { background: #222; padding: 15px; border-radius: 12px; color: white; text-decoration: none; display: flex; justify-content: space-between; align-items: center; }
  .date-box { text-align: center; margin-right: 15px; }
  .card-info { flex-grow: 1; }
  .card-title { font-weight: bold; font-size: 16px; margin: 5px 0; }
  .card-meta { font-size: 12px; color: #aaa; }
  .badges .b { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-right: 4px; background: #444; }
  .dday { font-size: 12px; font-weight: bold; color: #FF4B2B; }
</style>
</head>
<body>

  <div class="header">
    <div class="logo">RUN<span>NU</span></div>
    <button class="btn-logout" onclick="doLogout()">로그아웃</button>
  </div>

  <p id="updateTime" style="font-size:12px; color:#aaa; margin-bottom:20px;"></p>

  <div style="margin-bottom: 15px; font-size: 14px;">
    전체 대회 <span id="raceCount" style="color:#FF4B2B; font-weight:bold;">0</span>개
  </div>

  <div id="raceList">
    데이터를 불러오는 중입니다...
  </div>

<script src="app.js"></script>
<script>
  // 1. 페이지가 열릴 때 로그인 상태인지 확인
  var sessionStatus = restoreSession();

  // 2. 로그인이 안 되어 있다면 login.html로 강제 이동
  if (!sessionStatus) {
    window.location.href = getBasePath() + 'login.html';
  } else {
    // 3. 로그인이 되어 있다면, app.js의 loadRaces() 실행 후 목록 화면에 그리기
    loadRaces().then(function(list) {
      render(list); // 카드 UI 생성 함수
    });
  }
</script>
</body>
</html>
