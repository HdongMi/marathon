<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>런뉴 — 대회 일정</title>
<link rel="stylesheet" href="style.css">
<style>
  .tab-content { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .scroll-area::-webkit-scrollbar { display: none; }

  .list-hero { position: relative; height: 220px; flex-shrink: 0; }
  .list-hero img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
  .list-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, var(--bg) 100%); }
  .list-hero-content { position: absolute; bottom: 20px; left: 20px; right: 20px; }
  .list-hero-content h1 { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: #fff; line-height: 1; letter-spacing: 2px; }
  .list-hero-content h1 span { color: var(--accent); }
  .hero-sub { font-size: 11px; color: rgba(255,255,255,.6); margin-top: 6px; }
</style>
</head>
<body>
<div class="page" id="app">

  <div id="tabList" class="tab-content">

    <div class="list-hero">
      <img src="https://images.unsplash.com/photo-1530549387789-4c1017266635?w=800&q=80" alt="마라톤">
      <div class="list-hero-overlay"></div>
      <div class="list-hero-content">
        <h1>RUN <span>NOW</span></h1>
        <div class="hero-sub">국내 마라톤 · 트레일 · 러닝 대회</div>
      </div>
    </div>

    <div class="update-banner">
      <div class="update-dot"></div>
      <span id="updateTime">데이터 로딩 중...</span>
    </div>

    <div class="scroll-area">
      <div class="filter-section">
        <div class="filter-top">
          <span class="filter-title">코스 종류</span>
          <button class="filter-reset" onclick="resetFilters()">전체 보기</button>
        </div>
        <div class="course-grid">
          <label class="c-check"><input type="checkbox" value="풀" onchange="applyFilter()"><div class="c-box"><span class="c-icon">🥇</span><span class="c-name">풀코스</span></div></label>
          <label class="c-check"><input type="checkbox" value="하프" onchange="applyFilter()"><div class="c-box"><span class="c-icon">🥈</span><span class="c-name">하프</span></div></label>
          <label class="c-check"><input type="checkbox" value="10km" onchange="applyFilter()"><div class="c-box"><span class="c-icon">🏃</span><span class="c-name">10km</span></div></label>
          <label class="c-check"><input type="checkbox" value="5km" onchange="applyFilter()"><div class="c-box"><span class="c-icon">👟</span><span class="c-name">5km</span></div></label>
        </div>
        <div class="open-toggle-row">
          <span class="open-toggle-label">접수중인 대회만 보기</span>
          <div class="tog" id="openTog" onclick="toggleOpen()"><div class="tog-knob"></div></div>
        </div>
      </div>

      <div class="count-row">
        <span class="count-label">총 <strong id="raceCount">–</strong>개 대회</span>
      </div>

      <div class="race-list" id="raceList">
        <div class="state-box">
          <div class="spinner"></div>
          <div class="state-text">대회 정보를 불러오는 중...</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="app.js"></script>
<script>
  (async () => {
    const races = await loadRaces();
    if (!races || races.length === 0) {
      document.getElementById('raceList').innerHTML =
        '<div class="state-box"><div style="font-size:36px">⚠️</div><div class="state-text">대회 정보가 없습니다.</div></div>';
    } else {
      applyFilter();
    }
  })();
</script>
</body>
</html>
