<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>런뉴 - 마라톤 & 러닝 대회</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #161619;
    --surface2: #1e1e23;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f2;
    --text-muted: #7a7a8a;
    --accent: #e8f000;
    --accent2: #ff4d2e;
    --accent3: #00c9a7;
    --radius: 16px;
  }

  html, body {
    height: 100%;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    font-family: 'Noto Sans KR', sans-serif;
  }

  #phone {
    width: 390px;
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .screen.active { display: flex; }

  /* ── 히어로 ── */
  .list-hero {
    position: relative; height: 200px; overflow: hidden; flex-shrink: 0;
  }
  .list-hero img { width: 100%; height: 100%; object-fit: cover; filter: brightness(.5); }
  .list-hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 20%, var(--bg) 100%);
  }
  .list-hero-content { position: absolute; bottom: 20px; left: 20px; right: 20px; }
  .list-hero-content h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px; letter-spacing: 2px; color: #fff; line-height: 1;
  }
  .list-hero-content h1 span { color: var(--accent); }
  .hero-sub {
    font-size: 11px; color: rgba(255,255,255,.55); margin-top: 4px;
    font-weight: 300; letter-spacing: 1px; text-transform: uppercase;
  }

  /* ── 업데이트 배너 ── */
  .update-banner {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    background: rgba(232,240,0,.05);
    border-bottom: 1px solid rgba(232,240,0,.08);
    font-size: 11px; color: var(--text-muted); flex-shrink: 0;
  }
  .update-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── 코스 필터 ── */
  .filter-section {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .filter-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .filter-title {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1.2px;
  }
  .filter-reset {
    font-size: 11px; color: var(--accent); font-weight: 600;
    cursor: pointer; background: none; border: none;
    font-family: 'Noto Sans KR', sans-serif; padding: 0;
  }

  /* 4칸 체크박스 */
  .course-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .c-check { display: contents; }
  .c-check input[type=checkbox] { display: none; }
  .c-box {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 10px 6px; border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    cursor: pointer; transition: all .18s; user-select: none;
  }
  .c-check input:checked + .c-box {
    border-color: var(--accent);
    background: rgba(232,240,0,.1);
  }
  .c-icon { font-size: 20px; line-height: 1; }
  .c-name {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    letter-spacing: .3px; transition: color .18s;
  }
  .c-check input:checked + .c-box .c-name { color: var(--accent); }

  /* 접수중 토글 */
  .open-toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
  }
  .open-toggle-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .tog {
    width: 42px; height: 24px; border-radius: 12px;
    background: var(--surface2); border: 1.5px solid var(--border);
    position: relative; cursor: pointer; transition: all .2s; flex-shrink: 0;
  }
  .tog.on { background: var(--accent); border-color: var(--accent); }
  .tog-knob {
    position: absolute; top: 3px; left: 3px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--text-muted); transition: all .2s;
  }
  .tog.on .tog-knob { left: 20px; background: #000; }

  /* 카운트 */
  .count-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px 8px; flex-shrink: 0;
  }
  .count-label { font-size: 12px; color: var(--text-muted); }
  .count-label strong { color: var(--text); }

  /* 목록 스크롤 */
  .race-list { flex: 1; overflow-y: auto; padding: 0 16px 20px; }
  .race-list::-webkit-scrollbar { display: none; }

  /* 빈 상태 / 로딩 */
  .state-box {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 60px 20px; gap: 12px; text-align: center;
  }
  .spinner {
    width: 38px; height: 38px; border: 3px solid var(--surface2);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-text { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
  .retry-btn {
    padding: 10px 24px; border-radius: 10px;
    background: var(--accent); color: #000; font-weight: 700;
    border: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
  }

  /* ── 대회 카드 ── */
  .race-card {
    display: flex; gap: 12px; padding: 14px;
    background: var(--surface); border-radius: var(--radius);
    margin-bottom: 10px; border: 1px solid var(--border);
    cursor: pointer; transition: transform .15s;
    position: relative; overflow: hidden;
  }
  .race-card::before {
    content:''; position: absolute; left:0; top:0; bottom:0;
    width: 3px; background: var(--accent); border-radius: 3px 0 0 3px;
    opacity: 0; transition: opacity .15s;
  }
  .race-card:active { transform: scale(.98); }
  .race-card:active::before { opacity: 1; }

  .date-box {
    flex-shrink: 0; width: 50px; text-align: center;
    background: var(--surface2); border-radius: 10px; padding: 8px 4px;
    border: 1px solid var(--border);
  }
  .date-box .mo { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
  .date-box .dy { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; color: var(--text); line-height: 1; }
  .date-box .dw { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  .card-info { flex: 1; min-width: 0; }
  .badges { display: flex; gap: 5px; margin-bottom: 6px; flex-wrap: wrap; }
  .b {
    font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 4px; letter-spacing: .5px;
  }
  .b-full  { background: rgba(232,240,0,.15); color: var(--accent);  border: 1px solid rgba(232,240,0,.3); }
  .b-half  { background: rgba(0,201,167,.15);  color: var(--accent3); border: 1px solid rgba(0,201,167,.3); }
  .b-10k   { background: rgba(255,77,46,.15);   color: var(--accent2); border: 1px solid rgba(255,77,46,.3); }
  .b-5k    { background: rgba(0,180,255,.15);   color: #00b4ff;        border: 1px solid rgba(0,180,255,.3); }
  .b-ultra { background: rgba(255,160,0,.15);   color: #ffa500;        border: 1px solid rgba(255,160,0,.3); }
  .b-trail { background: rgba(120,100,255,.15); color: #a88fff;        border: 1px solid rgba(120,100,255,.3); }

  .card-title {
    font-size: 14px; font-weight: 700; color: var(--text);
    margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-meta { font-size: 11px; color: var(--text-muted); }

  .card-right {
    flex-shrink: 0; display: flex; align-items: center; justify-content: flex-end;
  }
  .dday {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700; padding: 4px 9px; border-radius: 6px;
  }
  .dday.open   { background: rgba(232,240,0,.15);  color: var(--accent); }
  .dday.close  { background: var(--surface2);       color: var(--text-muted); }
  .dday.soon   { background: rgba(255,77,46,.15);   color: var(--accent2); }
  .dday.before { background: rgba(0,180,255,.1);    color: #00b4ff; }

  /* ── 상세 화면 ── */
  #screen-detail { background: var(--bg); }
  .d-scroll { flex: 1; overflow-y: auto; }
  .d-scroll::-webkit-scrollbar { display: none; }

  .d-hero { position: relative; height: 240px; overflow: hidden; }
  .d-hero img { width: 100%; height: 100%; object-fit: cover; filter: brightness(.55); }
  .d-hero-grad {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,.25) 0%, var(--bg) 100%);
  }
  .d-back {
    position: absolute; top: 16px; left: 16px;
    width: 38px; height: 38px; background: rgba(0,0,0,.55);
    border: 1px solid rgba(255,255,255,.15); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; backdrop-filter: blur(10px);
  }
  .d-wish {
    position: absolute; top: 16px; right: 16px;
    width: 38px; height: 38px; background: rgba(0,0,0,.55);
    border: 1px solid rgba(255,255,255,.15); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; backdrop-filter: blur(10px);
  }
  .d-hero-txt { position: absolute; bottom: 20px; left: 20px; right: 70px; }
  .d-hero-txt h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 800; color: #fff;
    line-height: 1.15; text-shadow: 0 2px 12px rgba(0,0,0,.6);
  }

  .d-body { padding: 20px; }

  .d-courses { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .dc {
    padding: 7px 14px; border-radius: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: 1px;
  }
  .dc-full  { background: rgba(232,240,0,.15); color: var(--accent);  border: 1px solid rgba(232,240,0,.3); }
  .dc-half  { background: rgba(0,201,167,.15);  color: var(--accent3); border: 1px solid rgba(0,201,167,.3); }
  .dc-trail { background: rgba(120,100,255,.15);color: #a88fff;        border: 1px solid rgba(120,100,255,.3); }
  .dc-short { background: rgba(0,180,255,.15);  color: #00b4ff;        border: 1px solid rgba(0,180,255,.3); }
  .dc-ultra { background: rgba(255,160,0,.15);  color: #ffa500;        border: 1px solid rgba(255,160,0,.3); }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .info-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px;
  }
  .info-box.hi { border-color: rgba(232,240,0,.25); }
  .info-lbl { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 5px; }
  .info-val { font-size: 13px; color: var(--text); font-weight: 700; line-height: 1.4; }

  .d-section { margin-bottom: 22px; }
  .d-sec-title {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .d-sec-title::after { content:''; flex:1; height:1px; background: var(--border); }

  .link-row {
    display: flex; align-items: center; gap: 10px; padding: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer; transition: border-color .2s;
  }
  .link-row:active { border-color: var(--accent); }
  .link-icon {
    width: 32px; height: 32px; border-radius: 8px; background: var(--surface2);
    display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0;
  }
  .link-text { font-size: 13px; color: var(--text); font-weight: 500; }

  /* CTA */
  .cta-bar {
    padding: 10px 20px 30px;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
    display: flex; gap: 10px; flex-shrink: 0;
  }
  .cta-share {
    width: 50px; height: 50px; border-radius: 14px;
    border: 1px solid var(--border); background: var(--surface);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .cta-reg {
    flex: 1; height: 50px; border-radius: 14px;
    background: var(--accent); border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; font-weight: 700; color: #000;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform .15s;
  }
  .cta-reg.closed { background: var(--surface2); color: var(--text-muted); cursor: default; }
  .cta-reg:not(.closed):active { transform: scale(.97); }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(14px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .race-card { animation: fadeUp .3s ease both; }

  @media (max-width: 420px) { #phone { width: 100%; } }
</style>
</head>
<body>
<div id="phone">

  <!-- ══ 목록 화면 ══ -->
  <div class="screen active" id="screen-list">

    <div class="list-hero">
      <img src="https://images.unsplash.com/photo-1530549387789-4c1017266635?w=800&q=80" alt="마라톤">
      <div class="list-hero-overlay"></div>
      <div class="list-hero-content">
        <h1>RUN <span>NOW</span></h1>
        <div class="hero-sub">국내 마라톤 · 트레일 · 러닝 대회</div>
      </div>
    </div>

    <div class="update-banner">
      <div class="update-dot"></div>
      <span id="updateTime">데이터 로딩 중...</span>
    </div>

    <!-- 코스 필터 -->
    <div class="filter-section">
      <div class="filter-top">
        <span class="filter-title">코스 종류</span>
        <button class="filter-reset" onclick="resetFilters()">전체 보기</button>
      </div>
      <div class="course-grid">
        <label class="c-check">
          <input type="checkbox" value="풀" onchange="applyFilter()">
          <div class="c-box"><span class="c-icon">🏅</span><span class="c-name">풀코스</span></div>
        </label>
        <label class="c-check">
          <input type="checkbox" value="하프" onchange="applyFilter()">
          <div class="c-box"><span class="c-icon">🥈</span><span class="c-name">하프</span></div>
        </label>
        <label class="c-check">
          <input type="checkbox" value="10km" onchange="applyFilter()">
          <div class="c-box"><span class="c-icon">🏃</span><span class="c-name">10km</span></div>
        </label>
        <label class="c-check">
          <input type="checkbox" value="5km" onchange="applyFilter()">
          <div class="c-box"><span class="c-icon">👟</span><span class="c-name">5km</span></div>
        </label>
      </div>
      <div class="open-toggle-row">
        <span class="open-toggle-label">접수중인 대회만 보기</span>
        <div class="tog" id="openTog" onclick="toggleOpen()">
          <div class="tog-knob"></div>
        </div>
      </div>
    </div>

    <div class="count-row">
      <span class="count-label">총 <strong id="raceCount">–</strong>개 대회</span>
    </div>

    <div class="race-list" id="raceList">
      <div class="state-box">
        <div class="spinner"></div>
        <div class="state-text">대회 정보를 불러오는 중...</div>
      </div>
    </div>
  </div>

  <!-- ══ 상세 화면 ══ -->
  <div class="screen" id="screen-detail">
    <div class="d-scroll">
      <div class="d-hero">
        <img src="https://images.unsplash.com/photo-1513593771513-7b58b6c4af38?w=800&q=80" alt="" id="dImg">
        <div class="d-hero-grad"></div>
        <div class="d-back" onclick="showList()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        </div>
        <div class="d-wish" onclick="toggleWish()">
          <svg id="wishIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <div class="d-hero-txt">
          <h2 id="dTitle"></h2>
        </div>
      </div>

      <div class="d-body">
        <div class="d-courses" id="dCourses"></div>

        <div class="info-grid">
          <div class="info-box">
            <div class="info-lbl">📍 장소</div>
            <div class="info-val" id="dLocation">–</div>
          </div>
          <div class="info-box hi">
            <div class="info-lbl">📅 대회일</div>
            <div class="info-val" id="dDate">–</div>
          </div>
          <div class="info-box">
            <div class="info-lbl">📋 접수 기간</div>
            <div class="info-val" id="dReg" style="font-size:11px;line-height:1.6;">–</div>
          </div>
          <div class="info-box">
            <div class="info-lbl">🏁 접수 상태</div>
            <div class="info-val" id="dStatus">–</div>
          </div>
        </div>

        <div class="d-section">
          <div class="d-sec-title">공식 링크</div>
          <div class="link-row" onclick="openUrl()">
            <div class="link-icon">🌐</div>
            <div class="link-text" id="dLink">marathongo.co.kr</div>
          </div>
        </div>
      </div>
      <div style="height:90px;"></div>
    </div>

    <div class="cta-bar">
      <div class="cta-share" onclick="shareRace()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </div>
      <button class="cta-reg" id="ctaBtn" onclick="openUrl()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        대회 신청하기
      </button>
    </div>
  </div>

</div>

<script>
  let allRaces = [], selectedRace = null, openOnly = false, wished = false;
  const MON = ['','JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

  /* 데이터 로드 */
  async function loadRaces() {
    try {
      const res = await fetch(`races.json?t=${Date.now()}`);
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      allRaces = data.races || [];
      document.getElementById('updateTime').textContent =
        data.updated_at
          ? `마지막 업데이트: ${data.updated_at} · 매주 월요일 자동 갱신`
          : '데이터 로드 완료';
      applyFilter();
    } catch(e) {
      document.getElementById('raceList').innerHTML = `
        <div class="state-box">
          <div style="font-size:36px">⚠️</div>
          <div class="state-text">대회 정보를 불러오지 못했어요.<br>races.json을 확인해주세요.</div>
          <button class="retry-btn" onclick="loadRaces()">다시 시도</button>
        </div>`;
      document.getElementById('updateTime').textContent = '로드 실패';
    }
  }

  /* 필터 */
  function applyFilter() {
    const checked = [...document.querySelectorAll('.c-check input:checked')].map(el => el.value);
    let list = allRaces.slice();

    if (checked.length) {
      list = list.filter(r => {
        const cs = (r.courses || []).map(c => c.toLowerCase());
        return checked.some(sel => {
          if (sel === '풀')   return cs.some(c => c === '풀'  || c.includes('42'));
          if (sel === '하프') return cs.some(c => c === '하프' || c.includes('21'));
          if (sel === '10km') return cs.some(c => c.includes('10'));
          if (sel === '5km')  return cs.some(c => c === '5km' || c === '5k');
          return false;
        });
      });
    }

    if (openOnly) list = list.filter(r => r.status === '접수중');
    render(list);
  }

  function resetFilters() {
    document.querySelectorAll('.c-check input').forEach(el => el.checked = false);
    applyFilter();
  }

  function toggleOpen() {
    openOnly = !openOnly;
    document.getElementById('openTog').classList.toggle('on', openOnly);
    applyFilter();
  }

  /* 렌더 */
  function badge(course) {
    const c = course.toLowerCase();
    if (c.includes('100')||c.includes('70')||c.includes('50')) return `<span class="b b-ultra">${course}</span>`;
    if (c==='풀'||c.includes('42'))   return `<span class="b b-full">FULL</span>`;
    if (c==='하프'||c.includes('21')) return `<span class="b b-half">HALF</span>`;
    if (c.includes('10'))             return `<span class="b b-10k">10K</span>`;
    if (c.includes('5'))              return `<span class="b b-5k">5K</span>`;
    return `<span class="b b-trail">${course}</span>`;
  }

  function dday(r) {
    if (r.status==='마감')  return `<div class="dday close">마감</div>`;
    if (r.status==='접수전') return `<div class="dday before">접수전</div>`;
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.ceil((new Date(r.date) - today) / 86400000);
    if (diff < 0)   return `<div class="dday close">종료</div>`;
    if (diff === 0)  return `<div class="dday soon">D-DAY</div>`;
    if (diff <= 7)   return `<div class="dday soon">D-${diff}</div>`;
    return `<div class="dday open">접수중</div>`;
  }

  function render(list) {
    document.getElementById('raceCount').textContent = list.length;
    const el = document.getElementById('raceList');
    if (!list.length) {
      el.innerHTML = `<div class="state-box"><div style="font-size:36px">🏅</div><div class="state-text" style="margin-top:8px">해당 조건의 대회가 없어요</div></div>`;
      return;
    }
    el.innerHTML = list.map((r, i) => `
      <div class="race-card" style="animation-delay:${Math.min(i*45,350)}ms" onclick="showDetail(${allRaces.indexOf(r)})">
        <div class="date-box">
          <div class="mo">${MON[r.month]||''}</div>
          <div class="dy">${r.day}</div>
          <div class="dw">${r.dow}</div>
        </div>
        <div class="card-info">
          <div class="badges">${(r.courses||[]).slice(0,3).map(badge).join('')}</div>
          <div class="card-title">${r.title}</div>
          <div class="card-meta">📍 ${r.region||''} ${r.location||''}</div>
        </div>
        <div class="card-right">${dday(r)}</div>
      </div>`).join('');
  }

  /* 상세 */
  function showDetail(idx) {
    selectedRace = allRaces[idx];
    const r = selectedRace;

    document.getElementById('dTitle').textContent = r.title;
    document.getElementById('dLocation').textContent = (r.region||'') + ' ' + (r.location||'');
    document.getElementById('dDate').textContent = r.date + ' (' + r.dow + ')';
    document.getElementById('dReg').textContent = r.reg_period || '–';

    const sc = {'접수중':'var(--accent)','마감':'var(--text-muted)','접수전':'#00b4ff','종료':'var(--text-muted)'};
    const se = document.getElementById('dStatus');
    se.textContent = r.status || '–';
    se.style.color = sc[r.status] || 'var(--text)';

    document.getElementById('dCourses').innerHTML = (r.courses||[]).map(c => {
      const cl = c.toLowerCase();
      let t = 'dc-short';
      if (cl.includes('100')||cl.includes('70')||cl.includes('50')) t='dc-ultra';
      else if (cl==='풀'||cl.includes('42')) t='dc-full';
      else if (cl==='하프'||cl.includes('21')) t='dc-half';
      else if (cl.includes('vk')||cl.includes('kids')||cl.includes('trail')) t='dc-trail';
      return `<span class="dc ${t}">${c}</span>`;
    }).join('');

    const cta = document.getElementById('ctaBtn');
    if (r.status==='마감'||r.status==='종료') {
      cta.className='cta-reg closed'; cta.textContent='접수 마감';
    } else {
      cta.className='cta-reg';
      cta.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg> 대회 신청하기`;
    }

    document.getElementById('dLink').textContent = (r.detail_url||'marathongo.co.kr').replace('https://','');

    wished=false;
    document.getElementById('wishIcon').setAttribute('fill','none');
    document.getElementById('wishIcon').setAttribute('stroke','white');

    document.getElementById('screen-list').classList.remove('active');
    document.getElementById('screen-detail').classList.add('active');
    document.querySelector('.d-scroll').scrollTop = 0;
  }

  function showList() {
    document.getElementById('screen-detail').classList.remove('active');
    document.getElementById('screen-list').classList.add('active');
  }

  function openUrl() {
    if (selectedRace?.detail_url) window.open(selectedRace.detail_url,'_blank');
  }

  function shareRace() {
    if (!selectedRace) return;
    const text = `[런뉴] ${selectedRace.title}\n📅 ${selectedRace.date}\n📍 ${selectedRace.location||''}`;
    if (navigator.share) navigator.share({title:selectedRace.title, text, url:selectedRace.detail_url||location.href});
    else if (navigator.clipboard) navigator.clipboard.writeText(text).then(()=>alert('클립보드에 복사됐어요!'));
  }

  function toggleWish() {
    wished = !wished;
    document.getElementById('wishIcon').setAttribute('fill', wished?'#ff4d2e':'none');
    document.getElementById('wishIcon').setAttribute('stroke', wished?'#ff4d2e':'white');
  }

  loadRaces();
</script>
</body>
</html>
