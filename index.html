<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>런뉴 — 대회 일정</title>
<link rel="stylesheet" href="style.css">
<style>
  .tab-content { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .list-hero { position: relative; height: 220px; flex-shrink: 0; }
  .list-hero img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
  .list-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, var(--bg) 100%); }
  .list-hero-content { position: absolute; bottom: 20px; left: 20px; right: 20px; }
  .list-hero-content h1 { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: #fff; line-height: 1; letter-spacing: 2px; }
  .list-hero-content h1 span { color: var(--accent); }
  .hero-sub { font-size: 11px; color: rgba(255,255,255,.6); margin-top: 6px; }

  /* 마감 대회 링크 */
  .ended-link {
    display: block;
    margin: 12px 16px 24px;
    padding: 14px 16px;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 10px;
    color: rgba(255,255,255,.55);
    font-size: 13px;
    text-decoration: none;
    text-align: center;
    letter-spacing: .3px;
  }
  .ended-link:active { background: rgba(255,255,255,.1); }
</style>
</head>
<body>
<div class="page" id="app">

  <div id="tabList" class="tab-content">
    <div class="list-hero">
      <img src="https://images.unsplash.com/photo-1530549387789-4c1017266635?w=800&q=80" alt="마라톤">
      <div class="list-hero-overlay"></div>
      <div class="list-hero-content">
        <h1>RUN <span>NOW</span></h1>
        <div class="hero-sub">국내 마라톤 · 트레일 · 러닝 대회</div>
      </div>
    </div>

    <div class="update-banner">
      <div class="update-dot"></div>
      <span id="updateTime">데이터 로딩 중...</span>
    </div>

    <div class="scroll-area">
      <div class="filter-section">
        <div class="filter-top">
          <span class="filter-title">코스 종류</span>
          <button class="filter-reset" onclick="resetFilters()">전체 보기</button>
        </div>
        <div class="course-grid">
          <label class="c-check"><input type="checkbox" value="풀" onchange="applyFilter()"><div class="c-box"><span class="c-icon">🥇</span><span class="c-name">풀코스</span></div></label>
          <label class="c-check"><input type="checkbox" value="하프" onchange="applyFilter()"><div class="c-box"><span class="c-icon">🥈</span><span class="c-name">하프</span></div></label>
          <label class="c-check"><input type="checkbox" value="10km" onchange="applyFilter()"><div class="c-box"><span class="c-icon">🏃</span><span class="c-name">10km</span></div></label>
          <label class="c-check"><input type="checkbox" value="5km" onchange="applyFilter()"><div class="c-box"><span class="c-icon">👟</span><span class="c-name">5km</span></div></label>
        </div>
        <div class="open-toggle-row">
          <span class="open-toggle-label">접수중인 대회만 보기</span>
          <div class="tog" id="openTog" onclick="toggleOpen()"><div class="tog-knob"></div></div>
        </div>
      </div>

      <div class="count-row">
        <span class="count-label">총 <strong id="raceCount">–</strong>개 대회</span>
      </div>

      <div class="race-list" id="raceList">
        <div class="state-box">
          <div class="spinner"></div>
          <div class="state-text">대회 정보를 불러오는 중...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 탭바 -->
  <nav class="tab-bar">
    <a class="tab-btn active" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      대회목록
    </a>
    <a class="tab-btn" href="ended.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <line x1="9" y1="15" x2="15" y2="15"/>
      </svg>
      마감공고
    </a>
    <a class="tab-btn" href="wishlist.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      찜 목록
    </a>
  </nav>

</div>

<script src="app.js"></script>
<script>
  // ── 스크롤 위치 저장 / 복원 ──────────────────────────────
  const SCROLL_KEY = 'raceListScroll';
  const scrollArea = document.querySelector('.scroll-area');

  // 페이지 떠날 때 현재 스크롤 위치 저장
  window.addEventListener('pagehide', () => {
    sessionStorage.setItem(SCROLL_KEY, scrollArea.scrollTop);
  });
  // beforeunload 도 함께 (일부 Android WebView 대응)
  window.addEventListener('beforeunload', () => {
    sessionStorage.setItem(SCROLL_KEY, scrollArea.scrollTop);
  });

  // ── 초기 로드 ─────────────────────────────────────────────
  (async () => {
    const races = await loadRaces();

    if (!races || races.length === 0) {
      document.getElementById('raceList').innerHTML =
        '<div class="state-box"><div style="font-size:36px">⚠️</div><div class="state-text">대회 정보가 없습니다.</div></div>';
      return;
    }

    // ── 오늘 기준 접수 마감 공고 분리 ────────────────────────
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const activeRaces = races.filter(r => {
      if (!r.registrationEnd) return true;
      const end = new Date(r.registrationEnd);
      end.setHours(0, 0, 0, 0);
      return end >= today;
    });

    const endedRaces = races.filter(r => {
      if (!r.registrationEnd) return false;
      const end = new Date(r.registrationEnd);
      end.setHours(0, 0, 0, 0);
      return end < today;
    });

    if (typeof window.raceData !== 'undefined') {
      window.raceData = activeRaces;
    }

    // ended.html 로 넘길 용도로 sessionStorage 에 보관
    sessionStorage.setItem('endedRaces', JSON.stringify(endedRaces));

    // 마감 탭 배지 업데이트
    if (endedRaces.length > 0) {
      const endedTab = document.querySelector('a[href="ended.html"]');
      if (endedTab) {
        const badge = document.createElement('span');
        badge.className = 'tab-badge';
        badge.textContent = endedRaces.length;
        badge.style.cssText = `
          position:absolute; top:4px; right:50%; transform:translateX(14px);
          background:#e03; color:#fff; font-size:9px; font-weight:700;
          padding:1px 5px; border-radius:20px; line-height:1.6;
        `;
        endedTab.style.position = 'relative';
        endedTab.appendChild(badge);
      }
    }

    applyFilter();

    // ── 스크롤 복원 (렌더 완료 후) ───────────────────────────
    const saved = sessionStorage.getItem(SCROLL_KEY);
    if (saved) {
      requestAnimationFrame(() => {
        scrollArea.scrollTop = parseInt(saved, 10);
      });
    }
  })();
</script>
</body>
</html>
