<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>런뉴 — 찜한 대회</title>
<link rel="stylesheet" href="style.css">
<style>
  /* index와 동일한 고정 프레임 설정 */
  .page { height: 100vh; max-height: 100vh; }
  
  /* 비어있을 때 스타일 추가 */
  .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
  .btn-primary { display: inline-block; background: var(--accent); color: #000; padding: 12px 24px; border-radius: 12px; font-weight: 700; text-decoration: none; font-size: 14px; }
</style>
</head>
<body>
<div class="page">
  
  <div class="sub-header">
    <button class="sub-back" onclick="history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="sub-title">찜한 대회</div>
  </div>

  <div class="count-row">
    <span class="count-label">총 <strong id="raceCount">0</strong>개 대회</span>
  </div>

  <div class="race-list" id="raceList">
    <div class="state-box">
      <div class="spinner"></div>
      <div class="state-text">데이터를 불러오는 중...</div>
    </div>
  </div>

</div>

<script src="app.js"></script>
<script>
  (async () => {
    if (!restoreSession()) {
      window.location.href = getBasePath() + 'login.html';
      return;
    }

    await loadRaces();

    const myWishes = allRaces.filter(function(r) {
      return wishlist.includes(r.title); 
    });
    
    // 개수 업데이트
    document.getElementById('raceCount').textContent = myWishes.length;

    if (myWishes.length === 0) {
      document.getElementById('raceList').innerHTML = `
        <div class="empty-state">
          <div class="icon">💔</div>
          <p>아직 찜한 대회가 없어요.<br>마음에 드는 대회를 하트로 찜해보세요!</p>
          <a href="index.html" class="btn-primary">대회 찾아보기</a>
        </div>
      `;
    } else {
      if(typeof render === 'function') {
        render(myWishes);
      }
    }
  })();
</script>
</body>
</html>
