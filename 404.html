<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // 서브경로(/marathon/) 포함해서 리다이렉트
    var path = window.location.pathname;
    var repoName = '/marathon'; // ← 저장소 이름
    var cleanPath = path.replace(repoName, '') || '/';
    window.location.replace(
      window.location.origin + repoName + '/?p=' + encodeURIComponent(cleanPath)
    );
  </script>
</head>
</html>
